name: Release Wheels

on:
  push:
  release:
    types:
      - published

jobs:
  build_wheel:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: -1
        fetch-tags: true
    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
    - run: pip wheel --no-deps .
    - uses: actions/upload-artifact@v7
      with:
        name: wheel
        path: ./rlsalchemy*.whl

  # The rls package is claimed in test, so we skip this.
  # upload_wheel_test:
  #   needs: [build_wheel]
  #   runs-on: ubuntu-latest
  #   if: github.repository_owner == 'DelfinaCare' && github.ref == 'refs/heads/main'
  #   environment:
  #       name: pypi-test
  #       url: https://test.pypi.org/p/rls
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@v8
  #       with:
  #           name: wheel
  #           path: dist/
  #     - uses: pypa/gh-action-pypi-publish@release/v1
  #       with:
  #           repository-url: https://test.pypi.org/legacy/

  upload_wheel:
    needs: [build_wheel]
    runs-on: ubuntu-latest
    # this fork publishes under its own name `rlsalchemy` (the `rls` name on PyPI is upstream
    # DelfinaCare/rls); gated on a release published under this owner, with the pypi trusted
    # publisher configured for the `rlsalchemy` project.
    if: github.event_name == 'release' && github.event.action == 'published' && github.repository_owner == 'phvv-me'
    environment:
        name: pypi
        url: https://pypi.org/p/rlsalchemy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
            name: wheel
            path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
